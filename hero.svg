<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="600" height="600"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- background -->
    <rect x="0" y="0" width="600" height="600" fill="#1a1b1e"/>

    <!-- rainbow side bands -->
    <g>
      <rect x="0"  y="0" width="18" height="600" fill="#e0483e"/>
      <rect x="18" y="0" width="18" height="600" fill="#f0932b"/>
      <rect x="36" y="0" width="18" height="600" fill="#f6c445"/>
      <rect x="54" y="0" width="18" height="600" fill="#5fb86b"/>
      <rect x="72" y="0" width="18" height="600" fill="#3b5ba5"/>
      <rect x="90" y="0" width="18" height="600" fill="#7a5ec4"/>
    </g>
    <g transform="translate(600,0) scale(-1,1)">
      <rect x="0"  y="0" width="18" height="600" fill="#e0483e"/>
      <rect x="18" y="0" width="18" height="600" fill="#f0932b"/>
      <rect x="36" y="0" width="18" height="600" fill="#f6c445"/>
      <rect x="54" y="0" width="18" height="600" fill="#5fb86b"/>
      <rect x="72" y="0" width="18" height="600" fill="#3b5ba5"/>
      <rect x="90" y="0" width="18" height="600" fill="#7a5ec4"/>
    </g>

    <!-- center panel -->
    <rect x="108" y="0" width="384" height="600" fill="#232428"/>

    <!-- shoulders / gown -->
    <path d="M 150 600 L 150 430 Q 300 340 450 430 L 450 600 Z" fill="#111214"/>
    <!-- gown collar V -->
    <path d="M 300 400 L 250 460 L 300 470 L 350 460 Z" fill="#2b2c30"/>

    <!-- rainbow stole -->
    <path d="M 268 415 L 240 590 L 262 590 L 288 425 Z" fill="#f0932b"/>
    <path d="M 288 425 L 262 590 L 284 590 L 306 432 Z" fill="#f6c445"/>
    <path d="M 332 415 L 360 590 L 338 590 L 312 425 Z" fill="#5fb86b"/>
    <path d="M 312 425 L 338 590 L 316 590 L 294 432 Z" fill="#3b5ba5"/>

    <!-- neck -->
    <rect x="278" y="370" width="44" height="60" rx="10" fill="#7a4b32"/>

    <!-- head -->
    <ellipse cx="300" cy="300" rx="86" ry="98" fill="#8a5a3d"/>

    <!-- ears -->
    <ellipse cx="212" cy="305" rx="12" ry="18" fill="#8a5a3d"/>
    <ellipse cx="388" cy="305" rx="12" ry="18" fill="#8a5a3d"/>

    <!-- short afro hair -->
    <path d="M 214 268
             Q 200 190 300 178
             Q 400 190 386 268
             Q 386 230 340 224
             Q 320 208 300 224
             Q 280 208 260 224
             Q 214 230 214 268 Z" fill="#141414"/>

    <!-- eyebrows -->
    <rect x="255" y="288" width="34" height="8" rx="4" fill="#1c1c1c"/>
    <rect x="311" y="288" width="34" height="8" rx="4" fill="#1c1c1c"/>

    <!-- eyes -->
    <ellipse cx="270" cy="308" rx="9" ry="7" fill="#1c1c1c"/>
    <ellipse cx="330" cy="308" rx="9" ry="7" fill="#1c1c1c"/>

    <!-- nose -->
    <path d="M 300 300 L 292 336 Q 300 344 308 336 Z" fill="#75492f"/>

    <!-- mouth: warm smile -->
    <path d="M 270 358 Q 300 376 330 358" stroke="#3a2416" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- mortarboard cap -->
    <g>
      <rect x="256" y="196" width="88" height="20" rx="3" fill="#111214"/>
      <path d="M 190 196 L 300 156 L 410 196 L 300 236 Z" fill="#161719"/>
      <circle cx="300" cy="196" r="9" fill="#f6c445"/>
      <!-- tassel -->
      <path d="M 300 196 L 342 196 L 350 260" stroke="#f6c445" stroke-width="4" fill="none"/>
      <circle cx="350" cy="266" r="7" fill="#f6c445"/>
    </g>
  </g>
</svg>
